<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Playfair+Display+SC:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&family=Playfair+Display:ital@0;1&display=swap"
          rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&display=swap"
          rel="stylesheet"/>
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"/>
    <title>Каталог услуг</title>
</head>
<body>
<nav>
    <div class="navbar">
        <div class="nav-links">
            <img src="/static/images/nail.png" alt="logo" class="logo-img">
            <a href="{{ url_for('home') }}"><span>ГЛАВНАЯ</span></a>
            <a href="#"><span>УСЛУГИ</span></a>
            <a href="#"><span>ГАЛЕРЕЯ</span></a>
        </div>
        <div class="phone-wrapper">
            {% if username %}
            <span class="material-symbols-outlined login-logo">account_circle</span>
            <div class="profile-trigger">
                <a href="/cart" class="username">{{ username }}</a>
            </div>
            {% else %}
            <span class="material-symbols-outlined">login</span>
            <a href="/register" class="register-link">РЕГИСТРАЦИЯ</a>
            {% endif %}
        </div>
    </div>
</nav>

<div class="container-catalog">
    {% for product in products %}
    <div class="item-catalog" data-product-id="{{ product.id }}">
        <img src="{{ product.image }}" alt="{{ product.name }}">
        <h3>{{ product.name }}</h3>
        <p>{{ product.about }}</p>
        <p class="price">{{ product.price }}₽</p>
        <div class="quantity-controls">
            <button class="remove-btn" data-action="remove">
                <span class="material-symbols-outlined">remove</span>
            </button>
            <span class="quantity-display" id="qty-{{ product.id }}"></span>
            <button class="add-btn" data-action="add">
                <span class="material-symbols-outlined">add</span>
            </button>
        </div>
    </div>
    {% endfor %}
</div>
<div id="toast" class="toast"></div>

<script>
    function showToast(message, type = 'success') {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.className = `toast ${type}`;

        setTimeout(() => {
            toast.classList.add('show');
        }, 100);

        setTimeout(() => {
            toast.classList.remove('show');
        }, 2000);
    }

    // Функция обновления количества
    async function updateCart(productId, action) {
        const quantity = action === 'add' ? 1 : -1;
        const card = document.querySelector(`.item-catalog[data-product-id="${productId}"]`);
        const display = card.querySelector('.quantity-display');

        try {
            const response = await fetch('/cart/update', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    product_id: productId,
                    quantity: quantity,
                    action: action
                })
            });

            if (!response.ok) {
                const error = await response.json();
                showToast(error.error || 'Ошибка', 'error');
                return;
            }

            const data = await response.json();
            display.textContent = data.quantity > 0 ? data.quantity : '';

            updateCartCounter();

        } catch (error) {
            console.error('Ошибка:', error);
            showToast('❌ Ошибка соединения', 'error');
        }
    }

    // Функция обновления счетчика в навигации
    async function updateCartCounter() {
        try {
            const response = await fetch('/cart');
            const data = await response.json();

            const cartLink = document.querySelector('.cart-link');
            if (cartLink && data.total_items > 0) {
                cartLink.textContent = `🛒 Корзина (${data.total_items})`;
            } else if (cartLink) {
                cartLink.textContent = '🛒 Корзина';
            }
        } catch (error) {
            console.error('Ошибка обновления счетчика:', error);
        }
    }

    // Навешиваем обработчики на все кнопки
    document.addEventListener('DOMContentLoaded', function() {
        document.querySelectorAll('.add-btn, .remove-btn').forEach(button => {
            button.addEventListener('click', function(e) {
                e.preventDefault();

                const card = this.closest('.item-catalog');
                const productId = parseInt(card.dataset.productId);
                const action = this.dataset.action;

                const username = '{{ username }}';
                if (!username || username === 'None') {
                    showToast('⚠️ Войдите в систему', 'error');
                    return;
                }

                updateCart(productId, action);
            });
        });

        updateCartCounter();

        async function loadQuantities() {
            try {
                const response = await fetch('/cart');
                const data = await response.json();

                if (data.items) {
                    data.items.forEach(item => {
                        const display = document.getElementById(`qty-${item.product_id}`);
                        if (display) {
                            display.textContent = item.quantity > 0 ? item.quantity : '';
                        }
                    });
                }
            } catch (error) {
                console.error('Ошибка загрузки корзины:', error);
            }
        }

        loadQuantities();
    });
</script>
</body>
</html>
